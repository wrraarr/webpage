<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLO Data Entry — Informatics PLO Mapper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1612;
            --cream: #f5f0e8;
            --warm: #e8dcc8;
            --rust: #c4541a;
            --amber: #d97706;
            --forest: #2d5a27;
            --slate: #64748b;
            --border: #d1c4aa;
            --card-bg: #252018;
            --input-bg: #1e1a14;
            --hover: #2a2520;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--ink);
            min-height: 100vh;
            color: var(--cream);
            padding: 0;
        }

        /* Header */
        header {
            background: var(--ink);
            border-bottom: 3px solid var(--rust);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            color: var(--amber);
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        header .subtitle {
            font-size: 12px;
            color: var(--slate);
            font-family: 'Space Mono', monospace;
        }

        /* Layout */
        .app {
            display: flex;
            height: calc(100vh - 51px);
        }
        .main-panel {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .json-panel {
            width: 420px;
            background: #0d0b08;
            border-left: 2px solid var(--rust);
            display: flex;
            flex-direction: column;
        }
        .json-panel-header {
            padding: 16px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .json-panel-header h3 {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            color: var(--amber);
        }
        .json-output {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .json-output pre {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #a8a090;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }

        /* Course Card */
        .course-card {
            background: var(--card-bg);
            border: 1px solid #3a3228;
            border-radius: 8px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .course-header {
            background: #2a2418;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #3a3228;
        }
        .course-header h2 {
            font-size: 15px;
            color: var(--amber);
            font-family: 'Space Mono', monospace;
        }
        .course-body { padding: 20px; }

        /* Form Elements */
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .form-group.small { flex: 0 0 200px; }
        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--slate);
            font-weight: 600;
        }
        input[type="text"], textarea {
            background: var(--input-bg);
            border: 1px solid #3a3228;
            border-radius: 4px;
            padding: 10px 12px;
            color: var(--cream);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            border-color: var(--amber);
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* CLO Entry */
        .clo-section {
            margin-top: 20px;
            border-top: 1px solid #3a3228;
            padding-top: 16px;
        }
        .clo-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .clo-section-header h3 {
            font-size: 13px;
            color: var(--cream);
            font-weight: 600;
        }
        .clo-item {
            background: var(--input-bg);
            border: 1px solid #3a3228;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
        }
        .clo-item:hover { border-color: #4a4238; }
        .clo-number {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--rust);
            margin-bottom: 8px;
            font-weight: 700;
        }
        .clo-text-input {
            width: 100%;
            margin-bottom: 12px;
        }

        /* PLO Picker */
        .plo-picker { margin-top: 8px; }
        .plo-picker-label {
            font-size: 11px;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .pillar-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }
        .pillar-tab {
            padding: 6px 12px;
            background: #2a2418;
            border: 1px solid #3a3228;
            border-radius: 4px;
            color: var(--slate);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif;
        }
        .pillar-tab:hover { border-color: var(--amber); color: var(--cream); }
        .pillar-tab.active {
            background: var(--rust);
            border-color: var(--rust);
            color: white;
        }
        .pillar-tab.computational.active { background: #c4541a; border-color: #c4541a; }
        .pillar-tab.sociotechnical.active { background: #2d5a27; border-color: #2d5a27; }
        .pillar-tab.design.active { background: #6d28d9; border-color: #6d28d9; }

        .category-section { margin-bottom: 6px; }
        .category-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--amber);
            margin-bottom: 4px;
            padding: 4px 0;
        }
        .plo-options {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .plo-chip {
            padding: 4px 10px;
            background: #2a2418;
            border: 1px solid #3a3228;
            border-radius: 3px;
            font-size: 10px;
            color: #a8a090;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Space Mono', monospace;
            position: relative;
        }
        .plo-chip:hover {
            border-color: var(--amber);
            color: var(--cream);
        }
        .plo-chip.selected {
            background: var(--rust);
            border-color: var(--rust);
            color: white;
        }
        .plo-chip.selected.computational { background: #c4541a; border-color: #c4541a; }
        .plo-chip.selected.sociotechnical { background: #2d5a27; border-color: #2d5a27; }
        .plo-chip.selected.design { background: #6d28d9; border-color: #6d28d9; }

        .plo-chip .tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a1612;
            border: 1px solid var(--amber);
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 11px;
            color: var(--cream);
            white-space: nowrap;
            z-index: 50;
            font-family: 'Space Grotesk', sans-serif;
            pointer-events: none;
            max-width: 300px;
            white-space: normal;
        }
        .plo-chip:hover .tooltip { display: block; }

        /* Selected PLO tags */
        .selected-plos {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
            min-height: 24px;
        }
        .selected-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-family: 'Space Mono', monospace;
            color: white;
        }
        .selected-tag.computational { background: #c4541a; }
        .selected-tag.sociotechnical { background: #2d5a27; }
        .selected-tag.design { background: #6d28d9; }
        .selected-tag .remove-tag {
            cursor: pointer;
            opacity: 0.7;
            font-size: 12px;
            line-height: 1;
        }
        .selected-tag .remove-tag:hover { opacity: 1; }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }
        .btn-primary {
            background: var(--rust);
            color: white;
            border-color: var(--rust);
        }
        .btn-primary:hover { background: #d65a20; }
        .btn-secondary {
            background: transparent;
            color: var(--cream);
            border-color: #3a3228;
        }
        .btn-secondary:hover { background: var(--hover); border-color: var(--amber); }
        .btn-danger {
            background: transparent;
            color: #ef4444;
            border-color: #3a1515;
        }
        .btn-danger:hover { background: #3a1515; }
        .btn-small { padding: 5px 10px; font-size: 11px; }
        .btn-copy {
            background: var(--amber);
            color: var(--ink);
            border: none;
            font-weight: 700;
        }
        .btn-copy:hover { background: #e8a007; }

        /* Add course button */
        .add-course-area {
            text-align: center;
            padding: 20px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--slate);
        }
        .empty-state p { font-size: 13px; margin-top: 8px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3228; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a4238; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--forest);
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* Import area */
        .import-area {
            padding: 16px;
            border-top: 1px solid #333;
        }
        .import-area textarea {
            width: 100%;
            min-height: 80px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            margin-bottom: 8px;
        }

        /* Preview Modal */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1e1a14;
            border: 1px solid rgba(245,240,232,0.15);
            border-radius: 10px;
            width: 640px; max-width: 90vw;
            max-height: 80vh;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(245,240,232,0.1);
        }
        .modal-header h2 {
            font-family: 'Space Mono', monospace;
            font-size: 14px; color: var(--amber);
            font-weight: 700;
        }
        .modal-close {
            background: none; border: none; color: rgba(245,240,232,0.4);
            font-size: 20px; cursor: pointer; padding: 4px 8px;
            border-radius: 4px; transition: all 0.2s;
        }
        .modal-close:hover { color: #f87171; background: rgba(248,113,113,0.1); }
        .modal-body {
            flex: 1; overflow-y: auto; padding: 20px;
        }
        .preview-course {
            background: rgba(245,240,232,0.04);
            border: 1px solid rgba(245,240,232,0.08);
            border-radius: 6px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .preview-course-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 10px;
        }
        .preview-course-num {
            font-family: 'Space Mono', monospace;
            font-size: 13px; color: var(--amber); font-weight: 700;
        }
        .preview-course-title {
            font-size: 12px; color: rgba(245,240,232,0.6);
        }
        .preview-clo {
            margin: 6px 0 6px 12px;
            padding: 8px 12px;
            background: rgba(245,240,232,0.03);
            border-left: 3px solid var(--rust);
            border-radius: 0 4px 4px 0;
            font-size: 12px; color: var(--cream);
        }
        .preview-plo-tags {
            margin-top: 4px;
            display: flex; flex-wrap: wrap; gap: 4px;
        }
        .preview-plo-tag {
            font-family: 'Space Mono', monospace;
            font-size: 9px; padding: 2px 6px;
            border-radius: 3px; color: white;
        }
        .preview-plo-tag.computational { background: #c4541a; }
        .preview-plo-tag.sociotechnical { background: #2d5a27; }
        .preview-plo-tag.design { background: #6d28d9; }
        .modal-footer {
            padding: 14px 20px;
            border-top: 1px solid rgba(245,240,232,0.1);
            display: flex; justify-content: flex-end; gap: 8px;
        }
        .preview-warn {
            font-size: 11px; color: #f87171;
            margin-bottom: 12px; padding: 8px 12px;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.15);
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>CLO Data Entry</h1>
        <span class="subtitle">manual CLO → PLO mapper</span>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn btn-secondary btn-small" onclick="importJSON()">Import JSON</button>
        <button class="btn btn-primary btn-small" onclick="addCourse()">+ Add Course</button>
        <button class="btn btn-small" id="clearAllBtn" style="display:none; background:transparent; color:#f87171; border-color:#3a1515;" onclick="clearAll()">Clear All</button>
        <span style="width:1px; height:24px; background:#3a3228; margin:0 4px;"></span>
        <button class="btn btn-small" style="background:var(--forest); color:white; border-color:var(--forest);" onclick="sendToViewer()">Send to Viewer &#x2192;</button>
    </div>
</header>

<div class="app">
    <div class="main-panel" id="mainPanel">
        <div class="empty-state" id="emptyState">
            <h3 style="color:var(--amber);">No courses yet</h3>
            <p>Click <strong>+ Add Course</strong> to start entering CLOs and linking them to PLOs.</p>
        </div>
    </div>
    <div class="json-panel">
        <div class="json-panel-header">
            <h3>JSON Output</h3>
            <div style="display:flex; gap:6px;">
                <button class="btn btn-copy btn-small" onclick="copyJSON()">Copy</button>
                <button class="btn btn-secondary btn-small" onclick="downloadJSON()">Download</button>
            </div>
        </div>
        <div class="json-output">
            <pre id="jsonOutput">{ "courses": [] }</pre>
        </div>
        <div class="import-area">
            <label style="margin-bottom:8px; display:block;">Paste JSON to Import</label>
            <textarea id="importInput" placeholder='Paste JSON here and click "Import JSON" above...'></textarea>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- Preview Modal -->
<div class="modal-overlay" id="previewModal" onclick="if(event.target===this)closePreview()">
    <div class="modal">
        <div class="modal-header">
            <h2>Review Before Sending</h2>
            <button class="modal-close" onclick="closePreview()">&times;</button>
        </div>
        <div class="modal-body" id="previewBody"></div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closePreview()">Cancel</button>
            <button class="btn" id="confirmSendBtn" style="background:var(--forest); color:white; border-color:var(--forest);" onclick="confirmSend()">Send to Viewer &rarr;</button>
        </div>
    </div>
</div>

<script>
// ── PLO DATA ──
const PLO_DATA = {
    "Computational Thinking": {
        pillarClass: "computational",
        categories: {
            "Reason Logically": [
                { id: "comp-reason-0", text: "Translate arguments into formal language" },
                { id: "comp-reason-1", text: "Manipulate mathematical objects" },
                { id: "comp-reason-2", text: "Recognize equivalence between structures" },
                { id: "comp-reason-3", text: "Decompose problems into simpler structures" },
                { id: "comp-reason-4", text: "Apply data-driven approaches" }
            ],
            "Curate Data": [
                { id: "comp-data-0", text: "Apply visual methods for complex structures" },
                { id: "comp-data-1", text: "Recognize and use basic data structures" },

                { id: "comp-algo-3", text: "Research new problem-solving strategies" },
                { id: "comp-algo-4", text: "Address security concerns" }
            ],
            "Effectively Implement": [
                { id: "comp-impl-0", text: "Apply basic programming structures" },
                { id: "comp-impl-1", text: "Translate algorithms into code" },
                { id: "comp-impl-2", text: "Construct distributed systems" },
                { id: "comp-impl-3", text: "Research new software tools" },
                { id: "comp-impl-4", text: "Implement security solutions" },
                { id: "comp-impl-5", text: "Evaluate solution effectiveness" }

        }
    },
    "Sociotechnical Thinking": {
        pillarClass: "sociotechnical",
        categories: {
            "Ethical Sensibility": [
                { id: "socio-ethics-0", text: "Formulate and articulate ideas" },
                { id: "socio-ethics-1", text: "Recognize assumptions and biases" },
                { id: "socio-ethics-2", text: "Weigh connections between actors" },

            ],

                { id: "socio-analyze-3", text: "Explain technical and social processes" },

                { id: "socio-create-3", text: "Communicate with stakeholders" },
                { id: "socio-create-4", text: "Make values-based decisions" },
                { id: "socio-create-5", text: "Assess policy and governance" }
            ]
        }
    },
    "Design Thinking": {
        pillarClass: "design",
        categories: {
            "Research": [
                { id: "design-research-0", text: "Classify HCI research methods" },
                { id: "design-research-1", text: "Execute ethical research" },
                { id: "design-research-2", text: "Deconstruct and reframe problems" },
                { id: "design-research-3", text: "Identify design opportunities" },

                { id: "design-research-5", text: "Translate research to prototypes" }

            "Design": [

            ],
            "Collaborate": [
                { id: "design-collab-0", text: "Work in peer teams" },

};

// ── STATE ──
let courses = [];
let nextCourseId = 1;

// ── COURSE MANAGEMENT ──
function addCourse() {
    const course = {
        id: nextCourseId++,
        courseNumber: "",
        courseTitle: "",
        description: "",
        clos: []
    };
    courses.push(course);
    renderAll();
}

function removeCourse(courseId) {
    courses = courses.filter(c => c.id !== courseId);
    renderAll();
}

function addCLO(courseId) {
    const course = courses.find(c => c.id === courseId);
    if (!course) return;
    course.clos.push({
        id: Date.now(),
        text: "",
        ploMappings: [],
        activePillar: null
    });
    renderAll();
}

function removeCLO(courseId, cloId) {
    const course = courses.find(c => c.id === courseId);
    if (!course) return;
    course.clos = course.clos.filter(c => c.id !== cloId);
    renderAll();
}

function togglePLO(courseId, cloId, ploId) {
    const course = courses.find(c => c.id === courseId);
    if (!course) return;
    const clo = course.clos.find(c => c.id === cloId);
    if (!clo) return;
    const idx = clo.ploMappings.indexOf(ploId);
    if (idx === -1) {
        clo.ploMappings.push(ploId);
    } else {
        clo.ploMappings.splice(idx, 1);
    }
    renderAll();
}

function setPillar(courseId, cloId, pillarName) {
    const course = courses.find(c => c.id === courseId);
    if (!course) return;
    const clo = course.clos.find(c => c.id === cloId);
    if (!clo) return;
    clo.activePillar = clo.activePillar === pillarName ? null : pillarName;
    renderAll();
}

function getPillarClassForPLO(ploId) {
    for (const [, pillar] of Object.entries(PLO_DATA)) {
        for (const [, plos] of Object.entries(pillar.categories)) {
            if (plos.find(p => p.id === ploId)) return pillar.pillarClass;
        }
    }
    return "";
}

// ── SAVE FIELD VALUES ──
function saveFields() {
    document.querySelectorAll('[data-field]').forEach(el => {
        const courseId = parseInt(el.dataset.courseId);
        const field = el.dataset.field;
        const course = courses.find(c => c.id === courseId);
        if (course) course[field] = el.value;
    });
    document.querySelectorAll('[data-clo-field]').forEach(el => {
        const courseId = parseInt(el.dataset.courseId);
        const cloId = parseInt(el.dataset.cloId);
        const course = courses.find(c => c.id === courseId);
        if (!course) return;
        const clo = course.clos.find(c => c.id === cloId);
        if (clo) clo.text = el.value;
    });
}

// ── RENDER ──
function renderAll() {
    saveFields();
    updateJSON();
    updateClearBtn();

    const panel = document.getElementById('mainPanel');
    const empty = document.getElementById('emptyState');

    // Remove old course cards
    panel.querySelectorAll('.course-card, .add-course-area').forEach(el => el.remove());

    if (courses.length === 0) {
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    courses.forEach((course, ci) => {
        const card = document.createElement('div');
        card.className = 'course-card';
        card.innerHTML = `
            <div class="course-header">
                <h2>Course ${ci + 1}</h2>
                <button class="btn btn-danger btn-small" onclick="removeCourse(${course.id})">Remove Course</button>
            </div>
            <div class="course-body">
                <div class="form-row">
                    <div class="form-group small">
                        <label>Course Number</label>
                        <input type="text" data-field="courseNumber" data-course-id="${course.id}" value="${esc(course.courseNumber)}" placeholder="e.g. INFO-I 101" oninput="debouncedUpdate()">
                    </div>
                    <div class="form-group">
                        <label>Course Title</label>
                        <input type="text" data-field="courseTitle" data-course-id="${course.id}" value="${esc(course.courseTitle)}" placeholder="e.g. Introduction to Informatics" oninput="debouncedUpdate()">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description (~50 words)</label>
                    <textarea data-field="description" data-course-id="${course.id}" placeholder="Brief course description..." oninput="debouncedUpdate()">${esc(course.description)}</textarea>
                </div>

                <div class="clo-section">
                    <div class="clo-section-header">
                        <h3>Course Learning Outcomes</h3>
                        <button class="btn btn-primary btn-small" onclick="addCLO(${course.id})">+ Add CLO</button>
                    </div>
                    <div id="clos-${course.id}">
                        ${course.clos.length === 0 ? '<p style="color:var(--slate); font-size:12px; padding:12px 0;">No CLOs yet. Click "+ Add CLO" to begin.</p>' : ''}
                        ${course.clos.map((clo, idx) => renderCLO(course, clo, idx)).join('')}
                    </div>
                </div>
            </div>
        `;
        panel.appendChild(card);
    });

    // Add course button at bottom
    const addArea = document.createElement('div');
    addArea.className = 'add-course-area';
    addArea.innerHTML = '<button class="btn btn-secondary" onclick="addCourse()">+ Add Another Course</button>';
    panel.appendChild(addArea);
}

function renderCLO(course, clo, idx) {
    const selectedTags = clo.ploMappings.map(ploId => {
        const cls = getPillarClassForPLO(ploId);
        return `<span class="selected-tag ${cls}">${ploId}<span class="remove-tag" onclick="togglePLO(${course.id}, ${clo.id}, '${ploId}')">&times;</span></span>`;
    }).join('');

    let pickerHTML = '';
    if (clo.activePillar && PLO_DATA[clo.activePillar]) {
        const pillar = PLO_DATA[clo.activePillar];
        pickerHTML = Object.entries(pillar.categories).map(([catName, plos]) => `
            <div class="category-section">
                <div class="category-name">${catName}</div>
                <div class="plo-options">
                    ${plos.map(plo => `
                        <span class="plo-chip ${clo.ploMappings.includes(plo.id) ? 'selected ' + pillar.pillarClass : ''}" onclick="togglePLO(${course.id}, ${clo.id}, '${plo.id}')">
                            ${plo.id}
                            <span class="tooltip">${plo.text}</span>
                        </span>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    const pillarNames = Object.keys(PLO_DATA);

    return `
        <div class="clo-item">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="clo-number">CLO ${idx + 1}</div>
                <button class="btn btn-danger btn-small" style="padding:2px 8px; font-size:10px;" onclick="removeCLO(${course.id}, ${clo.id})">&times;</button>
            </div>
            <input type="text" class="clo-text-input" data-clo-field="text" data-course-id="${course.id}" data-clo-id="${clo.id}" value="${esc(clo.text)}" placeholder="Enter CLO text (start with action verb)..." oninput="debouncedUpdate()">

            <div class="selected-plos">${selectedTags || '<span style="color:var(--slate); font-size:11px;">No PLOs linked yet</span>'}</div>

            <div class="plo-picker">
                <div class="plo-picker-label">Link to PLOs</div>
                <div class="pillar-tabs">
                    ${pillarNames.map(name => {
                        const cls = PLO_DATA[name].pillarClass;
                        const active = clo.activePillar === name ? 'active' : '';
                        return `<button class="pillar-tab ${cls} ${active}" onclick="setPillar(${course.id}, ${clo.id}, '${name}')">${name}</button>`;
                    }).join('')}
                </div>
                ${pickerHTML}
            </div>
        </div>
    `;
}

function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── JSON OUTPUT ──
function updateJSON() {
    saveFields();
    const output = {
        courses: courses.map(c => ({
            courseNumber: c.courseNumber || "",
            courseTitle: c.courseTitle || "",
            description: c.description || "",
            clos: c.clos.map(clo => ({
                text: clo.text || "",
                ploMappings: [...clo.ploMappings]
            }))
        }))
    };
    document.getElementById('jsonOutput').textContent = JSON.stringify(output, null, 2);
}

let debounceTimer;
function debouncedUpdate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(updateJSON, 200);
}

// ── COPY / DOWNLOAD ──
function copyJSON() {
    const text = document.getElementById('jsonOutput').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('JSON copied to clipboard!'));
}

function downloadJSON() {
    const text = document.getElementById('jsonOutput').textContent;
    const blob = new Blob([text], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'clo_plo_mappings.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('JSON downloaded!');
}

// ── IMPORT ──
function importJSON() {
    const input = document.getElementById('importInput').value.trim();
    if (!input) {
        showToast('Paste JSON into the import area first');
        return;
    }
    try {
        const data = JSON.parse(input);
        if (!data.courses || !Array.isArray(data.courses)) {
            showToast('Invalid format: expected { "courses": [...] }');
            return;
        }
        courses = data.courses.map(c => ({
            id: nextCourseId++,
            courseNumber: c.courseNumber || "",
            courseTitle: c.courseTitle || "",
            description: c.description || "",
            clos: (c.clos || []).map(clo => ({
                id: Date.now() + Math.random() * 1000,
                text: clo.text || "",
                ploMappings: clo.ploMappings || [],
                activePillar: null
            }))
        }));
        document.getElementById('importInput').value = '';
        renderAll();
        showToast(`Imported ${data.courses.length} course(s)!`);
    } catch (e) {
        showToast('Invalid JSON: ' + e.message);
    }
}

// ── TOAST ──
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── SEND TO VIEWER (with preview) ──
let pendingOutput = null;

function getPillarClassForPLOId(ploId) {
    if (ploId.startsWith('comp-')) return 'computational';
    if (ploId.startsWith('socio-')) return 'sociotechnical';
    if (ploId.startsWith('design-')) return 'design';
    return '';
}

function buildOutput() {
    saveFields();
    return {
        courses: courses.filter(c => c.courseNumber && c.clos.length > 0).map(c => ({
            courseNumber: c.courseNumber || "",
            courseTitle: c.courseTitle || "",
            description: c.description || "",
            clos: c.clos.filter(clo => clo.text && clo.ploMappings.length > 0).map(clo => ({
                text: clo.text,
                ploMappings: [...clo.ploMappings]
            }))
        }))
    };
}

function sendToViewer() {
    const output = buildOutput();
    if (output.courses.length === 0) {
        showToast('No complete courses to send (need course number + at least one CLO with PLO mappings)');
        return;
    }
    pendingOutput = output;
    renderPreview(output);
    document.getElementById('previewModal').classList.add('show');
}

function closePreview() {
    document.getElementById('previewModal').classList.remove('show');
    pendingOutput = null;
}

function renderPreview(output) {
    const body = document.getElementById('previewBody');
    let html = '';

    // Warnings for incomplete data
    const warnings = [];
    courses.forEach(c => {
        if (!c.courseNumber) return;
        const emptyCLOs = c.clos.filter(clo => clo.text && clo.ploMappings.length === 0);
        if (emptyCLOs.length > 0) {
            warnings.push(`${c.courseNumber}: ${emptyCLOs.length} CLO(s) have no PLO mappings and will be excluded`);
        }
        const noTextCLOs = c.clos.filter(clo => !clo.text);
        if (noTextCLOs.length > 0) {
            warnings.push(`${c.courseNumber}: ${noTextCLOs.length} CLO(s) have no text and will be excluded`);
        }
    });
    const skippedCourses = courses.filter(c => !c.courseNumber && c.clos.length > 0);
    if (skippedCourses.length > 0) {
        warnings.push(`${skippedCourses.length} course(s) missing course number — excluded`);
    }

    if (warnings.length > 0) {
        html += '<div class="preview-warn">';
        warnings.forEach(w => { html += w + '<br>'; });
        html += '</div>';
    }

    const totalCLOs = output.courses.reduce((s, c) => s + c.clos.length, 0);
    const allPLOs = new Set();
    output.courses.forEach(c => c.clos.forEach(clo => clo.ploMappings.forEach(id => allPLOs.add(id))));

    html += `<div style="font-size:12px; color:rgba(245,240,232,0.5); margin-bottom:14px;">
        Sending <strong style="color:var(--amber)">${output.courses.length}</strong> course(s),
        <strong style="color:var(--amber)">${totalCLOs}</strong> CLO(s),
        touching <strong style="color:var(--amber)">${allPLOs.size}</strong> unique PLO(s)
    </div>`;

    output.courses.forEach(c => {
        html += `<div class="preview-course">`;
        html += `<div class="preview-course-header">
            <span class="preview-course-num">${esc(c.courseNumber)}</span>
            <span class="preview-course-title">${esc(c.courseTitle)}</span>
        </div>`;

        c.clos.forEach((clo, i) => {
            html += `<div class="preview-clo">
                <strong style="color:var(--rust); font-size:10px;">CLO ${i + 1}:</strong> ${esc(clo.text)}
                <div class="preview-plo-tags">`;
            clo.ploMappings.forEach(id => {
                const cls = getPillarClassForPLOId(id);
                html += `<span class="preview-plo-tag ${cls}">${id}</span>`;
            });
            html += `</div></div>`;
        });

        html += `</div>`;
    });

    body.innerHTML = html;
}

function confirmSend() {
    if (!pendingOutput) return;

    const jsonStr = JSON.stringify(pendingOutput);
    const encoded = encodeURIComponent(jsonStr);
    const viewerUrl = new URL('CLO_PLO_mapper.html', window.location.href).href;
    window.open(viewerUrl + '#import=' + encoded, '_blank');
    showToast(`Sent ${pendingOutput.courses.length} course(s) to viewer!`);

    closePreview();
}

// ── CLEAR ALL ──
function updateClearBtn() {
    document.getElementById('clearAllBtn').style.display = courses.length > 0 ? 'inline-flex' : 'none';
}

function clearAll() {
    if (!confirm('Clear all courses and CLOs? This cannot be undone.')) return;
    courses = [];
    nextCourseId = 1;
    renderAll();
}

// ── POPULATE FROM MAPPER (URL hash #courses=...) ──
function checkIncomingCourses() {
    try {
        const hash = window.location.hash;
        if (!hash.startsWith('#courses=')) return;
        const encoded = hash.substring('#courses='.length);
        const data = JSON.parse(decodeURIComponent(encoded));
        history.replaceState(null, '', window.location.pathname);
        if (!data.courses || !Array.isArray(data.courses)) return;
        courses = data.courses.map(c => ({
            id: nextCourseId++,
            courseNumber: c.courseNumber || '',
            courseTitle: c.courseTitle || '',
            description: c.description || '',
            clos: (c.clos || []).map(clo => ({
                id: Date.now() + Math.random() * 10000,
                text: clo.text || '',
                ploMappings: Array.isArray(clo.ploMappings) ? [...clo.ploMappings] : [],
                activePillar: null
            }))
        }));
    } catch (e) {
        console.warn('Could not load incoming courses:', e);
    }
}

// ── INIT ──
checkIncomingCourses();
renderAll();
</script>
</body>
</html>
